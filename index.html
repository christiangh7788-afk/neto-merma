<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Merma — Tiendas Neto Veracruz</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Neto Merma">
  <meta name="theme-color" content="#0d1117">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0d1117;color:#e8eaf0;display:flex;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px}

/* SIDEBAR */
#sidebar{width:220px;background:rgba(255,255,255,0.02);border-right:1px solid rgba(255,255,255,0.06);
  display:flex;flex-direction:column;padding:24px 0;position:fixed;top:0;left:0;bottom:0;z-index:10}
.brand{padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,0.06)}
.brand-sub{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:2px;font-weight:700;margin-bottom:3px}
.brand-title{font-size:15px;font-weight:800}
.brand-region{font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px}
nav{flex:1;padding:16px 10px}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;
  background:transparent;border:1px solid transparent;border-radius:10px;cursor:pointer;
  color:rgba(255,255,255,0.4);font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;
  margin-bottom:3px;transition:all 0.15s;text-align:left}
.nav-btn.active{background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.3);color:#60a5fa;font-weight:700}
.nav-icon{font-size:16px}
.meta-box{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.06)}
.meta-label{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px;margin-bottom:4px}
.meta-val{font-size:24px;font-weight:800;font-family:'DM Mono',monospace;color:#22c55e}
.meta-sub{font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px}

/* MAIN */
#main{margin-left:220px;flex:1;padding:28px 32px;max-width:calc(100vw - 220px)}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:3px}
.page-sub{font-size:12px;color:rgba(255,255,255,0.35)}
.page-sub span{color:rgba(255,255,255,0.6);font-weight:600}
.zone-filters{display:flex;gap:6px;flex-wrap:wrap}
.zone-btn{padding:6px 14px;border-radius:20px;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);
  font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.zone-btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff}

/* VIEWS */
.view{display:none}.view.active{display:block}

/* KPI CARDS */
.kpi-row{display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.kpi{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;padding:18px 20px;flex:1;min-width:150px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.kpi-icon{font-size:20px;margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:800;font-family:'DM Mono',monospace;letter-spacing:-1px}
.kpi-label{font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px}
.kpi-sub{font-size:10px;color:rgba(255,255,255,0.25);margin-top:3px}

/* CARDS */
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:20px}
.card-title{font-size:12px;font-weight:700;color:rgba(255,255,255,0.6);margin-bottom:16px;letter-spacing:0.5px;text-transform:uppercase}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* BADGE */
.badge{border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700;letter-spacing:0.5px;display:inline-block}

/* TIENDA ROWS */
.tienda-row{display:flex;justify-content:space-between;align-items:center;
  padding:9px 12px;border-radius:8px;margin-bottom:5px;cursor:pointer;transition:opacity 0.15s}
.tienda-row:hover{opacity:0.8}
.tienda-nombre{font-size:12px;font-weight:600}
.tienda-zona{font-size:10px;color:rgba(255,255,255,0.3);margin-top:1px}
.tienda-right{display:flex;align-items:center;gap:8px}
.tienda-pct{font-family:'DM Mono',monospace;font-weight:700;font-size:13px}

/* RANKING TABLE */
.rank-table{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;overflow:hidden}
.rank-header{display:grid;grid-template-columns:50px 1fr 160px 130px 100px;
  padding:10px 20px;border-bottom:1px solid rgba(255,255,255,0.06);
  font-size:10px;color:rgba(255,255,255,0.3);font-weight:700;letter-spacing:1px}
.rank-row{display:grid;grid-template-columns:50px 1fr 160px 130px 100px;
  padding:13px 20px;border-bottom:1px solid rgba(255,255,255,0.04);align-items:center;transition:background 0.1s}
.rank-row:hover{background:rgba(255,255,255,0.03)}
.rank-num{font-size:16px;font-weight:800;font-family:'DM Mono',monospace}
.rank-nombre{font-size:13px;font-weight:600}
.rank-tendencia{font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px}
.rank-zona{font-size:11px;color:rgba(255,255,255,0.4)}
.rank-pct{font-family:'DM Mono',monospace;font-weight:700;font-size:15px}

/* SEARCH */
.search-box{padding:8px 14px;border-radius:8px;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);color:#e8eaf0;font-size:13px;
  font-family:'DM Sans',sans-serif;width:260px;outline:none;margin-bottom:14px}

/* CAPTURA */
.form-group{margin-bottom:16px}
.form-label{font-size:11px;color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:0.5px;display:block;margin-bottom:7px}
.form-select,.form-input{width:100%;padding:11px 14px;border-radius:9px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:#e8eaf0;font-size:14px;font-family:'DM Sans',sans-serif;outline:none}
.form-input{font-family:'DM Mono',monospace;font-size:20px;font-weight:700}
.btn-primary{width:100%;padding:13px;border-radius:9px;background:#3b82f6;border:none;
  color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s}
.btn-primary.ok{background:#22c55e}
.preview-box{padding:12px 16px;border-radius:9px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hist-row{display:flex;justify-content:space-between;align-items:center;
  padding:7px 10px;border-radius:7px;background:rgba(255,255,255,0.02);margin-bottom:4px}
.hist-sem{font-size:12px;color:rgba(255,255,255,0.4)}
.hist-val{font-family:'DM Mono',monospace;font-weight:700;font-size:13px}

/* CHART containers */
.chart-wrap{position:relative;height:240px;margin-top:8px}
.chart-wrap-sm{position:relative;height:80px}
.tienda-mini{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
  border-radius:12px;padding:14px;margin-bottom:10px}
.tienda-mini-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.scroll-list{max-height:360px;overflow-y:auto;padding-right:4px}
.alerta-rule{padding:10px 14px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:6px;
  background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.2);color:#fca5a5}

.merma-sel{padding:6px 12px;border-radius:8px;background:rgba(26,58,143,0.3);
  border:1px solid rgba(26,58,143,0.5);color:#e8eaf0;font-size:12px;font-weight:700;
  font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
.merma-sel option{background:#0d1117;color:#e8eaf0}
.subzona-sel{padding:5px 12px;border-radius:8px;background:rgba(232,93,4,0.15);
  border:1px solid rgba(232,93,4,0.4);color:#e8eaf0;font-size:11px;font-weight:700;
  font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;margin-left:6px}
.subzona-sel option{background:#0d1117;color:#e8eaf0}


#back-btn{position:fixed;bottom:20px;right:16px;z-index:9999;
  background:#e85d04;border:none;
  color:#fff;font-size:12px;font-weight:800;font-family:'Syne',sans-serif;
  padding:10px 18px;border-radius:25px;cursor:pointer;
  display:flex;align-items:center;gap:6px;text-decoration:none;
  box-shadow:0 4px 20px rgba(232,93,4,0.5);transition:all 0.2s}
#back-btn:hover{background:#c2410c;transform:translateY(-2px)}


/* ── MOBILE HAMBURGER ─────────────────────────────────────────────────────── */
#hamburger{display:none;position:fixed;top:12px;left:12px;z-index:10000;
  background:#1a3a8f;border:none;border-radius:10px;padding:8px 10px;cursor:pointer;
  flex-direction:column;gap:4px;box-shadow:0 2px 12px rgba(0,0,0,0.4)}
#hamburger span{display:block;width:20px;height:2px;background:#fff;border-radius:2px;transition:all 0.3s}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9998}
@media(max-width:768px){
  #hamburger{display:flex}
  #sidebar{transform:translateX(-100%);transition:transform 0.3s;z-index:9999}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.open{display:block}
  #main{margin-left:0 !important;max-width:100vw !important;padding:16px 12px}
  .page-header{padding-top:48px}
  #back-btn{bottom:16px;right:12px;font-size:11px;padding:8px 14px}
}


/* ── MOBILE TOP HEADER ───────────────────────────────────────────────────── */
#mobile-header{
  display:none;position:fixed;top:0;left:0;right:0;z-index:9997;
  background:rgba(10,22,40,0.97);border-bottom:1px solid rgba(26,58,143,0.4);
  padding:8px 16px 8px 52px;
  align-items:center;gap:10px;backdrop-filter:blur(10px)}
#mobile-header img{width:32px;height:32px;border-radius:50%;object-fit:cover;
  border:1.5px solid rgba(232,93,4,0.5)}
#mobile-header .mh-title{font-size:13px;font-weight:800;color:#fff;font-family:'Syne',sans-serif}
#mobile-header .mh-sub{font-size:9px;color:rgba(255,255,255,0.35);font-weight:600;letter-spacing:1px}
@media(max-width:768px){
  #mobile-header{display:flex}
  #main{padding-top:58px !important}
  .page-header{padding-top:0 !important}
}


/* ── ZONE ACCORDION ────────────────────────────────────────────────────────── */
.zona-acordeon{margin-bottom:8px;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.06)}
.zona-header{display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;cursor:pointer;background:rgba(26,58,143,0.15);
  transition:background 0.2s;user-select:none}
.zona-header:hover{background:rgba(26,58,143,0.28)}
.zona-header-left{display:flex;flex-direction:column;gap:2px}
.zona-nombre{font-size:12px;font-weight:800;color:rgba(255,255,255,0.9);letter-spacing:0.5px}
.zona-tiendas-count{font-size:10px;color:rgba(255,255,255,0.35);font-weight:600}
.zona-header-right{display:flex;align-items:center;gap:10px}
.zona-pct-badge{font-size:14px;font-weight:800;font-family:'DM Mono',monospace}
.zona-arrow{font-size:10px;color:rgba(255,255,255,0.3);transition:transform 0.2s}
.zona-arrow.open{transform:rotate(180deg)}
.zona-tiendas{display:none;background:rgba(0,0,0,0.2)}
.zona-tiendas.open{display:block}
.zona-tienda-row{display:flex;justify-content:space-between;align-items:center;
  padding:9px 14px;border-top:1px solid rgba(255,255,255,0.04);transition:background 0.1s}
.zona-tienda-row:hover{background:rgba(255,255,255,0.03)}
.zona-tienda-nombre{font-size:11px;font-weight:600;color:rgba(255,255,255,0.8)}
.zona-tienda-right{display:flex;align-items:center;gap:8px}
.zona-tienda-pct{font-size:12px;font-weight:700;font-family:'DM Mono',monospace}
.zona-tienda-total{font-size:9px;color:rgba(255,255,255,0.3);margin-top:1px}

</style>
</head>

// Helpers
function color(v) {
  if (v === null || v === undefined) return "#64748b";
  if (v >= META) return "#6b9fff";
  if (v >= -0.80) return "#e85d04";
  return "#ef4444";
}
function bgColor(v) {
  if (v === null) return "rgba(255,255,255,0.02)";
  if (v >= META) return "rgba(107,159,255,0.1)";
  if (v >= -0.80) return "rgba(232,93,4,0.12)";
  return "rgba(239,68,68,0.12)";
}
function label(v) {
  if (v === null) return "Sin dato";
  if (v >= META) return "En meta";
  if (v >= -0.80) return "Alerta";
  return "Crítico";
}
function pct(v) {
  if (v === null || v === undefined) return "—";
  return v.toFixed(2) + "%";
}
function badge(v) {
  const c = color(v); const l = label(v);
  return `<span class="badge" style="background:${c}18;color:${c};border:1px solid ${c}30">${l}</span>`;
}
function ultimaVal(id) {
  const d = RESULTADOS[String(id)] || RESULTADOS[id];
  if (!d) return null;
  if (Array.isArray(d)) {
    for (let i = d.length-1; i>=0; i--) { if (d[i] !== null) return d[i]; }
    return null;
  }
  return d.pct !== undefined ? d.pct : null;
}
function ultimaTotal(id) {
  const d = RESULTADOS[String(id)] || RESULTADOS[id];
  if (!d || Array.isArray(d)) return null;
  return d.total !== undefined ? d.total : null;
}
function sucFiltradas() {

  if (zonaActiva !== "Todas") sucs = sucs.filter(s => s.zona === zonaActiva);
  if (subzonaActiva && subzonaActiva !== "Todas") sucs = sucs.filter(s => s.subzona === subzonaActiva);
  return sucs;
}

  Object.keys(datos).forEach(k => { RESULTADOS[k] = JSON.parse(JSON.stringify(datos[k])); });

}

function renderVista() {

          '<div class="zona-nombre">' + sub + '</div>' +
          '<div class="zona-tiendas-count">' + tiendas.length + ' tiendas</div>' +
        '</div>' +
        '<div class="zona-header-right">' +
          '<span class="zona-pct-badge" style="color:' + c + '">' + (prom_zona !== null ? prom_zona.toFixed(2)+'%' : '--') + '</span>' +
          '<span class="zona-arrow" id="arrow-zona-' + zIdx + '">&#9660;</span>' +
        '</div>' +
      '</div>' +
      '<div class="zona-tiendas" id="zona-' + zIdx + '">' + tiendaRows + '</div>' +
    '</div>';
  }
  document.getElementById('estado-list').innerHTML = estadoHTML;

  // Add click listeners after DOM is set
  for (var zi = 0; zi < subzonas.length; zi++) {
    (function(i) {
      var hdr = document.getElementById('hdr-zona-' + i);
      if (hdr) hdr.addEventListener('click', function() { window.toggleZona('zona-' + i); });
    })(zi);
  }

    return '<div class="zona-acordeon">' +
      '<div class="zona-header" onclick="toggleZona(\"zona-'+zIdx+'\")">'+
        '<div class="zona-header-left">'+
          '<div class="zona-nombre">'+sub+'</div>'+
          '<div class="zona-tiendas-count">'+tiendas.length+' tiendas</div>'+
        '</div>'+
        '<div class="zona-header-right">'+
          '<span class="zona-pct-badge" style="color:'+c+'">'+( prom_zona !== null ? prom_zona.toFixed(2)+'%' : '--')+'</span>'+
          '<span class="zona-arrow" id="arrow-zona-'+zIdx+'">&#9660;</span>'+
        '</div>'+
      '</div>'+
      '<div class="zona-tiendas" id="zona-'+zIdx+'">'+tirendasHTML+'</div>'+
    '</div>';
  }
  // end estado

// RANKING
let rankData = [];
function renderRanking() {
  const sucs = sucFiltradas();
  rankData = [...sucs].sort((a,b) => (ultimaVal(b.id)||0) - (ultimaVal(a.id)||0));
  pintarRanking(rankData);
}
function pintarRanking(data) {
  const medallas = ['🥇','🥈','🥉'];
  document.getElementById('ranking-body').innerHTML = data.map((s,i) => {
    const v = ultimaVal(s.id);
    const arr = RESULTADOS[s.id] || [];
    const prev = arr.length >= 2 ? arr.slice().reverse().find((x,idx) => idx > 0 && x !== null) : null;
    const tend = (v !== null && prev !== null) ? v - prev : null;
    const tendStr = tend !== null ? (tend > 0 ? `▲ ${Math.abs(tend).toFixed(2)}%` : tend < 0 ? `▼ ${Math.abs(tend).toFixed(2)}%` : '—') : '—';
    const numColor = i < 3 ? ['#f59e0b','rgba(255,255,255,0.5)','#b87333'][i] : 'rgba(255,255,255,0.2)';
    return `<div class="rank-row">
      <div class="rank-num" style="color:${numColor}">${i<3 ? medallas[i] : i+1}</div>
      <div><div class="rank-nombre">${s.nombre}</div><div class="rank-tendencia">${tendStr} vs sem. ant.</div></div>
      <div class="rank-zona">${s.zona}</div>
      <div style="text-align:center" class="rank-pct" style="color:${color(v)};"><span style="color:${color(v)}">${pct(v)}</span></div>
      <div style="text-align:center">${badge(v)}</div>
    </div>`;
  }).join('');
}
function filtrarRanking(q) {
  const f = rankData.filter(s => s.nombre.toLowerCase().includes(q.toLowerCase()) || s.zona.toLowerCase().includes(q.toLowerCase()));
  pintarRanking(f);
}

// TENDENCIA
function renderTendencia() {
  const sucs = sucFiltradas();
  // Promedio por semana
  const promedios = SEMANAS.map((_,i) => {
    const vals = sucs.map(s => (RESULTADOS[s.id]||[])[i]).filter(v => v !== null && v !== undefined);
    return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
  });

  if (chartTendencia) chartTendencia.destroy();
  chartTendencia = new Chart(document.getElementById('chart-tendencia'), {
    type: 'line',
    data: {
      labels: SEMANAS,
      datasets: [
        { label:'Promedio', data: promedios, borderColor:'#60a5fa', backgroundColor:'rgba(96,165,250,0.1)',
           borderWidth:2.5, pointRadius:5, pointBackgroundColor:'#60a5fa', tension:0.3, fill:true },
        { label:'Meta', data: SEMANAS.map(()=>META), borderColor:'#22c55e', borderDash:[5,5],
           borderWidth:1.5, pointRadius:0, fill:false }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'rgba(255,255,255,0.5)', font:{size:11} } },
        tooltip:{ callbacks:{ label: ctx => ctx.dataset.label+': '+pct(ctx.raw) } } },
      scales:{
        x:{ ticks:{color:'rgba(255,255,255,0.4)'}, grid:{color:'rgba(255,255,255,0.05)'} },
        y:{ ticks:{color:'rgba(255,255,255,0.4)', callback: v=>v+'%'}, grid:{color:'rgba(255,255,255,0.05)'} }
      }
    }
  });

  // Mini tarjetas por tienda
  const grid = document.getElementById('tendencia-grid');
  Object.values(chartsMin).forEach(c => c.destroy());
  chartsMin = {};
  grid.innerHTML = sucs.map(s => `
    <div class="tienda-mini">
      <div class="tienda-mini-header">
        <div><div class="tienda-nombre">${s.nombre}</div><div class="tienda-zona">${s.zona}</div></div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-family:'DM Mono',monospace;font-weight:700;font-size:14px;color:${color(ultimaVal(s.id))}">${pct(ultimaVal(s.id))}</span>
          ${badge(ultimaVal(s.id))}
        </div>
      </div>
      <div class="chart-wrap-sm"><canvas id="mini-${s.id}"></canvas></div>
    </div>`).join('');

  sucs.forEach(s => {
    const ctx = document.getElementById('mini-'+s.id);
    if (!ctx) return;
    const arr = RESULTADOS[s.id] || [];
    const v = ultimaVal(s.id);
    chartsMin[s.id] = new Chart(ctx, {
      type:'line',
      data:{ labels:SEMANAS, datasets:[
        { data:arr, borderColor:color(v), backgroundColor:color(v)+'20',
           borderWidth:2, pointRadius:3, pointBackgroundColor:color(v), tension:0.3, fill:true },
        { data:SEMANAS.map(()=>META), borderColor:'#22c55e55', borderDash:[4,4], borderWidth:1, pointRadius:0 }
      ]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx=>pct(ctx.raw) } } },
        scales:{
          x:{ticks:{color:'rgba(255,255,255,0.25)',font:{size:9}},grid:{display:false}},
          y:{ticks:{display:false},grid:{color:'rgba(255,255,255,0.04)'}}
        }
      }
    });
  });
}

// CAPTURA
function renderCaptura() {
  const sel = document.getElementById('cap-tienda');
  sel.innerHTML = SUCURSALES.map(s => `<option value="${s.id}">${s.nombre} (ECO ${s.eco})</option>`).join('');
  actualizarHistorial();
  // Alertas críticas
  const criticas = SUCURSALES.filter(s => { const v=ultimaVal(s.id); return v!==null && v < -0.80; })
    .sort((a,b) => ultimaVal(a.id) - ultimaVal(b.id));
  document.getElementById('alertas-criticas').innerHTML = criticas.slice(0,8).map(s => {
    const v = ultimaVal(s.id);
    return `<div class="alerta-rule">🚨 ${s.nombre.replace('Neto ','')} — <b>${pct(v)}</b></div>`;
  }).join('') || '<div style="font-size:12px;color:rgba(255,255,255,0.3)">Sin tiendas críticas en zona seleccionada</div>';
}

function actualizarHistorial() {
  const id = parseInt(document.getElementById('cap-tienda').value);
  const s = SUCURSALES.find(x => x.id === id);
  if (!s) return;
  document.getElementById('hist-title').textContent = 'Historial — ' + s.nombre;
  const arr = RESULTADOS[id] || [];
  document.getElementById('historial-body').innerHTML = SEMANAS.map((sem,i) => {
    const v = arr[i] ?? null;
    return `<div class="hist-row">
      <span class="hist-sem">${sem}</span>
      ${v !== null ? `<span class="hist-val" style="color:${color(v)}">${pct(v)}</span>` : '<span style="font-size:11px;color:rgba(255,255,255,0.2)">Sin registro</span>'}
    </div>`;
  }).join('');
}

function actualizarPreview() {
  const val = parseFloat(document.getElementById('cap-valor').value);
  const box = document.getElementById('cap-preview');
  if (isNaN(val)) { box.style.display='none'; return; }
  box.style.display='flex';
  box.style.background = bgColor(val);
  box.style.border = `1px solid ${color(val)}30`;
  document.getElementById('cap-preview-val').textContent = pct(val);
  document.getElementById('cap-preview-val').style.color = color(val);
  document.getElementById('cap-preview-badge').innerHTML = badge(val);
}

function guardarCaptura() {
  const id = parseInt(document.getElementById('cap-tienda').value);
  const semIdx = SEMANAS.indexOf(document.getElementById('cap-semana').value);
  const val = parseFloat(document.getElementById('cap-valor').value);
  if (isNaN(val) || semIdx < 0) return;
  if (!RESULTADOS[id]) RESULTADOS[id] = [null,null,null,null,null];
  RESULTADOS[id][semIdx] = val;
  const btn = document.getElementById('btn-guardar');
  btn.textContent = '✓ Guardado correctamente';
  btn.classList.add('ok');
  setTimeout(() => { btn.textContent='Guardar resultado'; btn.classList.remove('ok'); }, 2500);
  actualizarHistorial();
  document.getElementById('cap-valor').value = '';
  document.getElementById('cap-preview').style.display = 'none';
}
