<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Merma — Tiendas Neto</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#060f22}
body{font-family:'Syne',sans-serif;background:linear-gradient(135deg,#060f22,#0a1628,#0d1e3a);
  color:rgba(255,255,255,0.9);display:flex;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}

/* SIDEBAR */
#sidebar{width:220px;background:rgba(10,28,70,0.98);border-right:1px solid rgba(26,58,143,0.4);
  display:flex;flex-direction:column;padding:20px 0;position:fixed;top:0;left:0;
  bottom:0;height:100%;z-index:10;overflow-y:auto}
.brand{padding:0 16px 18px;border-bottom:1px solid rgba(26,58,143,0.35);text-align:center}
.brand img{width:56px;height:56px;border-radius:50%;border:2px solid rgba(232,93,4,0.4);margin-bottom:8px}
.brand-sub{font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:2px;font-weight:700}
.brand-title{font-size:13px;font-weight:800}
.brand-region{font-size:10px;color:rgba(255,255,255,0.35)}
nav{flex:1;padding:14px 10px}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;
  background:transparent;border:1px solid transparent;border-radius:10px;cursor:pointer;
  color:rgba(255,255,255,0.45);font-size:12px;font-weight:600;font-family:'Syne',sans-serif;
  margin-bottom:3px;transition:all 0.15s;text-align:left}
.nav-btn.active{background:rgba(26,58,143,0.3);border-color:rgba(26,58,143,0.6);color:#6b9fff}
.meta-box{padding:14px 16px;border-top:1px solid rgba(26,58,143,0.35)}
.meta-label{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1.5px;font-weight:700}
.meta-val{font-size:22px;font-weight:800;font-family:'DM Mono',monospace;color:#22c55e;margin-top:2px}
.meta-sub{font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px}

/* MAIN */
#main{margin-left:220px;flex:1;padding:24px 28px;max-width:calc(100vw - 220px);
  min-height:100vh;background:linear-gradient(135deg,#060f22,#0a1628,#0d1e3a)}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:22px;flex-wrap:wrap;gap:10px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:3px}
.selectors{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.sel{padding:6px 12px;border-radius:8px;color:#e8eaf0;font-size:12px;font-weight:700;
  font-family:'Syne',sans-serif;outline:none;cursor:pointer}
.sel-mes{background:rgba(26,58,143,0.3);border:1px solid rgba(26,58,143,0.5)}
.sel-zona{background:rgba(232,93,4,0.15);border:1px solid rgba(232,93,4,0.4)}
.sel option{background:#0a1628;color:#e8eaf0}
.zone-filters{display:flex;gap:6px;flex-wrap:wrap}
.zone-btn{padding:6px 14px;border-radius:20px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(26,58,143,0.35);color:rgba(255,255,255,0.45);
  font-size:11px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all 0.15s}
.zone-btn.active{background:#e85d04;border-color:#e85d04;color:#fff}
.view{display:none}.view.active{display:block}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:rgba(10,28,70,0.5);border:1px solid rgba(26,58,143,0.35);border-radius:14px;
  padding:16px 18px;position:relative;overflow:hidden}
.kpi-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.kpi-icon{font-size:18px;margin-bottom:5px}
.kpi-val{font-size:26px;font-weight:800;font-family:'DM Mono',monospace}
.kpi-label{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px;font-weight:600}
.kpi-sub{font-size:9px;color:rgba(255,255,255,0.25);margin-top:2px}

/* DASHBOARD GRID */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:rgba(10,28,70,0.4);border:1px solid rgba(26,58,143,0.3);border-radius:14px;padding:16px;overflow:hidden}
.card-title{font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);letter-spacing:1px;margin-bottom:12px}
.chart-wrap{height:280px;position:relative}
.scroll-list{max-height:310px;overflow-y:auto}

/* ACORDEON */
.zona-acordeon{margin-bottom:6px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.06)}
.zona-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;cursor:pointer;background:rgba(26,58,143,0.12);
  transition:background 0.2s;user-select:none}
.zona-hdr:hover{background:rgba(26,58,143,0.25)}
.zona-hdr-left .zona-nombre{font-size:12px;font-weight:800;color:rgba(255,255,255,0.9)}
.zona-hdr-left .zona-count{font-size:10px;color:rgba(255,255,255,0.3);margin-top:1px}
.zona-hdr-right{display:flex;align-items:center;gap:8px}
.zona-pct{font-size:14px;font-weight:800;font-family:'DM Mono',monospace}
.zona-arrow{font-size:10px;color:rgba(255,255,255,0.3);transition:transform 0.25s;display:inline-block}
.zona-body{display:none;background:rgba(0,0,0,0.15)}
.zona-body.open{display:block}
.zona-arrow.open{transform:rotate(180deg)}
.zt-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px;border-top:1px solid rgba(255,255,255,0.04)}
.zt-nombre{font-size:11px;font-weight:600;color:rgba(255,255,255,0.75)}
.zt-total{font-size:9px;color:rgba(255,255,255,0.3);margin-top:1px}
.zt-right{display:flex;align-items:center;gap:7px}
.zt-pct{font-size:12px;font-weight:700;font-family:'DM Mono',monospace}
.badge{display:inline-flex;align-items:center;justify-content:center;
  padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700}

/* RANKING */
.search-box{width:100%;padding:9px 14px;background:rgba(255,255,255,0.05);
  border:1px solid rgba(26,58,143,0.3);border-radius:10px;color:#e8eaf0;
  font-size:12px;font-family:'Syne',sans-serif;outline:none;margin-bottom:12px}
.rank-row{display:grid;grid-template-columns:32px 1fr 80px 80px;gap:8px;
  align-items:center;padding:10px 14px;background:rgba(10,28,70,0.4);
  border:1px solid rgba(26,58,143,0.25);border-radius:10px;margin-bottom:6px}
.rank-pos{font-size:14px;font-weight:800;font-family:'DM Mono',monospace;color:rgba(255,255,255,0.3);text-align:center}
.rank-nombre{font-size:12px;font-weight:700}
.rank-zona{font-size:10px;color:rgba(255,255,255,0.35);margin-top:1px}
.rank-pct{font-size:13px;font-weight:800;font-family:'DM Mono',monospace;text-align:right}
.rank-total{font-size:10px;color:rgba(255,255,255,0.35);text-align:right;font-family:'DM Mono',monospace}

/* TENDENCIA */
.tend-card{background:rgba(10,28,70,0.4);border:1px solid rgba(26,58,143,0.3);
  border-radius:14px;padding:16px;margin-bottom:16px}

/* MOBILE */
#hamburger{display:none;position:fixed;top:10px;left:10px;z-index:10000;
  background:#1a3a8f;border:none;border-radius:10px;padding:8px 10px;cursor:pointer;
  flex-direction:column;gap:4px}
#hamburger span{display:block;width:20px;height:2px;background:#fff;border-radius:2px}
#mob-header{display:none;position:fixed;top:0;left:0;right:0;z-index:9997;
  background:rgba(10,22,40,0.97);border-bottom:1px solid rgba(26,58,143,0.4);
  padding:8px 16px 8px 52px;align-items:center;gap:10px}
#mob-header img{width:30px;height:30px;border-radius:50%;object-fit:cover}
#mob-header .mh-t{font-size:13px;font-weight:800}
#mob-header .mh-s{font-size:9px;color:rgba(255,255,255,0.35);font-weight:600;letter-spacing:1px}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9998}
@media(max-width:768px){
  #hamburger{display:flex}
  #mob-header{display:flex}
  #sidebar{transform:translateX(-100%);transition:transform 0.3s;z-index:9999}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.open{display:block}
  #main{margin-left:0!important;max-width:100vw!important;padding:58px 12px 16px}
  .kpi-row{grid-template-columns:1fr 1fr}
  .dash-grid{grid-template-columns:1fr}
}

/* BACK BTN */


#portal-btn{position:fixed;top:12px;right:12px;z-index:10001;
  background:#e85d04;color:#fff;font-size:11px;font-weight:800;
  font-family:'Syne',sans-serif;padding:8px 16px;border-radius:20px;
  text-decoration:none;box-shadow:0 2px 12px rgba(232,93,4,0.4);
  border:none;cursor:pointer;letter-spacing:0.5px}
#portal-btn:hover{background:#c2410c}

</style>

<main id="main">
  <div class="page-header">
    <div>
      <div class="page-title" id="page-title">General</div>
      <div class="selectors">
        <span style="font-size:11px;color:rgba(255,255,255,0.35)">Periodo:</span>
        <select id="sel-mes" class="sel sel-mes" onchange="setMes(this.value)">
          <option value="2026-01">Enero 2026</option>
          <option value="2026-02">Febrero 2026</option>
          <option value="2026-03" selected>Marzo 2026</option>
        </select>
        <select id="sel-zona" class="sel sel-zona" onchange="setSubzona(this.value)">
          <option value="Todas">Todas las zonas</option>

  if (v === null) return "Sin datos";

  if (v >= -0.80) return "Alerta";
  return "Critica";
}
function badge(v) {
  var c = color(v);
  return '<span class="badge" style="background:'+c+'18;color:'+c+';border:1px solid '+c+'30">'+lbl(v)+'</span>';
}
function pct(v) { return v !== null ? v.toFixed(2)+"%" : "--"; }

function ultimaVal(id) {
  var d = RESULTADOS[String(id)];
  if (!d) return null;
  if (Array.isArray(d)) {
    for (var i = d.length-1; i >= 0; i--) { if (d[i] !== null) return d[i]; }
    return null;
  }
  return d.pct !== undefined ? d.pct : null;
}
function ultimaTotal(id) {
  var d = RESULTADOS[String(id)];
  if (!d || Array.isArray(d)) return null;
  return d.total !== undefined ? d.total : null;
}

function sucFiltradas() {
  var sucs = SUCURSALES.filter(function(s) {
    return RESULTADOS[String(s.id)] !== undefined;
  });
  if (zonaActiva !== "Todas") sucs = sucs.filter(function(s) { return s.zona === zonaActiva; });
  if (subzonaActiva !== "Todas") sucs = sucs.filter(function(s) { return s.subzona === subzonaActiva; });
  return sucs;
}

function actualizarSubzonas() {
  var base = zonaActiva === "Todas" ? SUCURSALES : SUCURSALES.filter(function(s) { return s.zona === zonaActiva; });
  var subs = ["Todas"];
  base.forEach(function(s) {
    if (s.subzona && s.subzona !== "nan" && subs.indexOf(s.subzona) < 0) subs.push(s.subzona);
  });
  subs.sort();
  var sel = document.getElementById("sel-zona");
  sel.innerHTML = subs.map(function(z) {
    return '<option value="'+z+'"'+(z===subzonaActiva?' selected':'')+'>'+z+'</option>';
  }).join("");
}

function setMes(val) {
  mesActivo = val;
  RESULTADOS = JSON.parse(JSON.stringify(HISTORIAL_MERMA[val] || {}));
  subzonaActiva = "Todas";
  actualizarSubzonas();
  renderVista();
}
function setZona(z, btn) {
  zonaActiva = z;
  subzonaActiva = "Todas";
  document.querySelectorAll(".zone-btn").forEach(function(b) { b.classList.remove("active"); });
  if (btn) btn.classList.add("active");
  actualizarSubzonas();
  renderVista();
}
function setSubzona(val) { subzonaActiva = val; renderVista(); }
function setVista(v) {
  document.querySelectorAll(".view").forEach(function(el) { el.classList.remove("active"); });
  document.querySelectorAll(".nav-btn").forEach(function(el) { el.classList.remove("active"); });
  document.getElementById("view-"+v).classList.add("active");
  document.getElementById("nav-"+v).classList.add("active");
  vistaActiva = v;
  var titles = {dashboard:"General",ranking:"Ranking",tendencia:"Tendencia"};
  document.getElementById("page-title").textContent = titles[v];
  renderVista();
}
function renderVista() {
  if (vistaActiva === "dashboard") renderDashboard();
  else if (vistaActiva === "ranking") renderRanking();
  else if (vistaActiva === "tendencia") renderTendencia();
}

function renderDashboard() {
  var sucs = sucFiltradas();
  var vals = sucs.map(function(s) { return ultimaVal(s.id); }).filter(function(v) { return v !== null; });
  var prom = vals.length ? vals.reduce(function(a,b){return a+b;},0)/vals.length : 0;
  var enMeta = vals.filter(function(v){return v>=META;}).length;
  var alerta = vals.filter(function(v){return v<META&&v>=-0.80;}).length;
  var critico = vals.filter(function(v){return v<-0.80;}).length;

  // KPIs
  var kpis = [
    {icon:"📊",val:pct(prom),label:"Promedio compañia",sub:"vs meta -0.65%",c:color(prom)},
    {icon:"✅",val:enMeta+"/"+sucs.length,label:"Tiendas en meta",sub:"Dentro del objetivo",c:"#6b9fff"},
    {icon:"⚠️",val:alerta,label:"Tiendas en alerta",sub:"Entre -0.65% y -0.80%",c:"#e85d04"},
    {icon:"🚨",val:critico,label:"Tiendas criticas",sub:"Por debajo de -0.80%",c:"#ef4444"}
  ];
  document.getElementById("kpi-row").innerHTML = kpis.map(function(k) {
    return '<div class="kpi"><div class="kpi-bar" style="background:'+k.c+'"></div>'+
      '<div class="kpi-icon">'+k.icon+'</div>'+
      '<div class="kpi-val" style="color:'+k.c+'">'+k.val+'</div>'+
      '<div class="kpi-label">'+k.label+'</div>'+
      '<div class="kpi-sub">'+k.sub+'</div></div>';
  }).join("");

  // Chart by zona
  var zonaMap = {};
  sucs.forEach(function(s) {
    var z = (s.subzona && s.subzona !== "nan" && s.subzona !== "") ? s.subzona : s.zona;
    if (!zonaMap[z]) zonaMap[z] = [];
    var v = ultimaVal(s.id);
    if (v !== null) zonaMap[z].push(v);
  });
  var zonaArr = Object.keys(zonaMap).map(function(z) {
    var arr = zonaMap[z];
    return {zona:z, prom: arr.length ? arr.reduce(function(a,b){return a+b;},0)/arr.length : 0};
  }).sort(function(a,b){return a.prom-b.prom;}).slice(0,15);

  var chartLabels = zonaArr.map(function(z){return z.zona;});
  var chartData = zonaArr.map(function(z){return z.prom;});
  var chartColors = chartData.map(function(v){return color(v)+"CC";});

  try {
    if (chartBarras) chartBarras.destroy();
    chartBarras = new Chart(document.getElementById("chart-barras"), {
      type:"bar",
      data:{labels:chartLabels,datasets:[{data:chartData,backgroundColor:chartColors,borderRadius:4}]},
      options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.raw.toFixed(2)+"%";}}}} ,
        scales:{
          x:{ticks:{color:"rgba(255,255,255,0.5)",callback:function(v){return v+"%"}},grid:{color:"rgba(255,255,255,0.05)"}},
          y:{ticks:{color:"rgba(255,255,255,0.5)",font:{size:10}},grid:{display:false}}
        }
      }
    });
  } catch(e) { console.warn("Chart error:", e); }

  // Estado acordeon
  var subzonaGrupos = {};
  sucs.forEach(function(s) {
    var z = (s.subzona && s.subzona !== "nan" && s.subzona !== "") ? s.subzona : s.zona;
    if (!subzonaGrupos[z]) subzonaGrupos[z] = [];
    subzonaGrupos[z].push(s);
  });
  var grupos = Object.keys(subzonaGrupos).sort(function(a,b) {
    var pa = subzonaGrupos[a].map(function(s){return ultimaVal(s.id);}).filter(function(v){return v!==null;});
    var pb = subzonaGrupos[b].map(function(s){return ultimaVal(s.id);}).filter(function(v){return v!==null;});
    var ma = pa.length ? pa.reduce(function(x,y){return x+y;},0)/pa.length : 0;
    var mb = pb.length ? pb.reduce(function(x,y){return x+y;},0)/pb.length : 0;
    return ma - mb;
  });

  var listaHTML = "";
  grupos.forEach(function(z, i) {
    var tiendas = subzonaGrupos[z];
    var vz = tiendas.map(function(s){return ultimaVal(s.id);}).filter(function(v){return v!==null;});
    var pz = vz.length ? vz.reduce(function(a,b){return a+b;},0)/vz.length : null;
    var cz = color(pz);

    var tiSorted = tiendas.slice().sort(function(a,b) {
      var va=ultimaVal(a.id), vb=ultimaVal(b.id);
      var ca=va===null?3:(va>=META?2:(va>=-0.80?1:0));
      var cb=vb===null?3:(vb>=META?2:(vb>=-0.80?1:0));
      return ca!==cb ? ca-cb : (va||0)-(vb||0);
    });

    var rows = tiSorted.map(function(s) {
      var v = ultimaVal(s.id);
      var tot = ultimaTotal(s.id);
      return '<div class="zt-row">'+
        '<div><div class="zt-nombre">'+s.nombre.replace("Neto ","")+'</div>'+
        (tot!==null?'<div class="zt-total">$'+tot.toLocaleString("es-MX",{maximumFractionDigits:0})+'</div>':'')+
        '</div><div class="zt-right">'+
        '<span class="zt-pct" style="color:'+color(v)+'">'+pct(v)+'</span>'+
        badge(v)+'</div></div>';
    }).join("");

    listaHTML += '<div class="zona-acordeon">'+
      '<div class="zona-hdr" data-idx="'+i+'">'+
        '<div class="zona-hdr-left">'+
          '<div class="zona-nombre">'+z+'</div>'+
          '<div class="zona-count">'+tiendas.length+' tiendas</div>'+
        '</div>'+
        '<div class="zona-hdr-right">'+
          '<span class="zona-pct" style="color:'+cz+'">'+pct(pz)+'</span>'+
          '<span class="zona-arrow" id="zarrow-'+i+'">&#9660;</span>'+
        '</div>'+
      '</div>'+
      '<div class="zona-body" id="zbody-'+i+'">'+rows+'</div>'+
    '</div>';
  });

  document.getElementById("estado-list").innerHTML = listaHTML;
  console.log('Estado: grupos='+grupos.length+' listaHTML length='+listaHTML.length);

  // Bind click events
  document.querySelectorAll(".zona-hdr").forEach(function(hdr) {
    hdr.addEventListener("click", function() {
      var i = this.getAttribute("data-idx");
      var body = document.getElementById("zbody-"+i);
      var arrow = document.getElementById("zarrow-"+i);
      if (body) body.classList.toggle("open");
      if (arrow) arrow.classList.toggle("open");
    });
  });
}

function renderRanking() {
  var sucs = sucFiltradas();
  rankData = sucs.slice().sort(function(a,b) {
    return (ultimaVal(a.id)||0)-(ultimaVal(b.id)||0);
  });
  pintarRanking(rankData);
}
function pintarRanking(data) {
  var medals = ["🥇","🥈","🥉"];
  document.getElementById("ranking-body").innerHTML = data.map(function(s,i) {
    var v = ultimaVal(s.id);
    var tot = ultimaTotal(s.id);
    return '<div class="rank-row">'+
      '<div class="rank-pos">'+(i<3?medals[i]:(i+1))+'</div>'+
      '<div><div class="rank-nombre">'+s.nombre+'</div><div class="rank-zona">'+(s.subzona||s.zona)+'</div></div>'+
      '<div class="rank-pct" style="color:'+color(v)+'">'+pct(v)+'</div>'+
      '<div class="rank-total">'+(tot!==null?'$'+tot.toLocaleString("es-MX",{maximumFractionDigits:0}):'--')+'</div>'+
    '</div>';
  }).join("");
}
function filtrarRanking(q) {
  var f = rankData.filter(function(s) { return s.nombre.toLowerCase().includes(q.toLowerCase()); });
  pintarRanking(f);
}

function renderTendencia() {
  var meses = Object.keys(HISTORIAL_MERMA).sort();
  var labels = meses.map(function(m) { return {"2026-01":"Ene","2026-02":"Feb","2026-03":"Mar"}[m]||m; });
  var promedios = meses.map(function(m) {
    var res = HISTORIAL_MERMA[m];
    var vals = Object.keys(res).map(function(k){
      var d=res[k]; return d&&d.pct!==undefined?d.pct:null;
    }).filter(function(v){return v!==null;});
    return vals.length ? vals.reduce(function(a,b){return a+b;},0)/vals.length : null;
  });
  try {
    if (chartTend) chartTend.destroy();
    chartTend = new Chart(document.getElementById("chart-tend"), {
      type:"line",
      data:{labels:labels,datasets:[{
        label:"Promedio merma %",data:promedios,
        borderColor:"#e85d04",backgroundColor:"rgba(232,93,4,0.1)",
        tension:0.3,pointRadius:5,pointBackgroundColor:"#e85d04",fill:true
      }]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.raw?c.raw.toFixed(2)+"%":"--";}}}},
        scales:{
          x:{ticks:{color:"rgba(255,255,255,0.5)"},grid:{color:"rgba(255,255,255,0.05)"}},
          y:{ticks:{color:"rgba(255,255,255,0.5)",callback:function(v){return v+"%"}},grid:{color:"rgba(255,255,255,0.05)"}}
        }
      }
    });
  } catch(e) { console.warn("Chart tend error:", e); }
}

function toggleSidebar() {
  var s = document.getElementById("sidebar");
  var o = document.getElementById("sidebar-overlay");
  if (s) s.classList.toggle("open");
  if (o) o.classList.toggle("open");
}

// INIT
window.addEventListener('load', function() {
  actualizarSubzonas();
  renderDashboard();
});
</script>
</body>
